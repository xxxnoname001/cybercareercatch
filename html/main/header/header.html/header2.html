<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../../../../assets/css/main/header/header2.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">
        <a href="메인페이지_주소.html" class="logo-link" aria-label="CyberCareerCatch 홈">
          <span class="logo-strong">C</span><span class="logo-soft">yber</span>
          <span class="logo-strong">C</span><span class="logo-soft">areer</span>
          <span class="logo-strong">C</span><span class="logo-soft">atch</span>
        </a>
      </h1>

      <nav class="main-nav" aria-label="메인 메뉴">
        <ul class="nav-list">
          <li class="nav-item dropdown">
            <a href="#" class="nav-link" onclick="toggleDropdown(event)">직군검사</a>
            <ul class="dropdown-menu">
              <li><a href="보안컨설팅_페이지주소.html">보안컨설팅</a></li>
              <li><a href="시스템엔지니어_페이지주소.html">시스템/네트워크/엔지니어</a></li>
              <li><a href="보안관제_페이지주소.html">보안관제</a></li>
              <li><a href="디지털포렌식_페이지주소.html">침해사고/디지털포렌식</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a href="기업홍보_페이지주소.html" class="nav-link">기업홍보</a>
          </li>

          <li class="nav-item dropdown">
            <a href="#" class="nav-link" onclick="toggleDropdown(event)">커뮤니티</a>
            <ul class="dropdown-menu">
              <li><a href="자유게시판_페이지주소.html">자유게시판</a></li>
              <li><a href="기업QnA_페이지주소.html">기업QnA</a></li>
              <li><a href="박람회일정_페이지주소.html">박람회일정</a></li>
            </ul>
          </li>
        </ul>
      </nav>

      <div class="auth-area">
        <!-- 로그인한 회원 이름이 들어갈 자리 -->
        <a
          href="마이페이지_주소.html"
          class="auth-btn auth-btn--member"
          aria-label="마이페이지로 이동"
        >
          <span class="member-name" id="headerMemberName">홍길동님</span>
          <svg class="member-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 12a4.25 4.25 0 1 0-4.25-4.25A4.25 4.25 0 0 0 12 12Zm0 1.75c-4.14 0-7.5 2.52-7.5 5.63A1.12 1.12 0 0 0 5.63 20.5h12.74A1.12 1.12 0 0 0 19.5 19.38C19.5 16.27 16.14 13.75 12 13.75Z"
              fill="currentColor"
            />
          </svg>
        </a>

        <a href="로그아웃_처리주소.html" class="auth-btn auth-btn--logout">로그아웃</a>
      </div>
    </div>
  </header>

  <script>
    function toggleDropdown(event) {
      event.preventDefault();

      const currentDropdown = event.currentTarget.closest(".dropdown");
      const dropdowns = document.querySelectorAll(".dropdown");

      dropdowns.forEach((dropdown) => {
        if (dropdown !== currentDropdown) {
          dropdown.classList.remove("active");
        }
      });

      currentDropdown.classList.toggle("active");
    }

    window.addEventListener("click", function (event) {
      if (!event.target.closest(".dropdown")) {
        document.querySelectorAll(".dropdown").forEach((dropdown) => {
          dropdown.classList.remove("active");
        });
      }
    });
  </script>
</body>
</html>
