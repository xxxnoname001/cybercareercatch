<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유게시판</title>
  <link rel="stylesheet" href="../../../assets/css/main/community/post-list.css">
</head>
<body>
  <main class="qna-list-main">
    <div class="qna-list-top">
      <h2 class="qna-list-title">자유게시판</h2>
    </div>

    <div class="qna-list-head">
      <div class="qna-list-col-num">번호</div>
      <div class="qna-list-col-title">제목</div>
      <div class="qna-list-col-writer">작성자</div>
      <div class="qna-list-col-date">작성일</div>
    </div>

    <div id="postList"></div>

    <div class="qna-list-pg" id="pagination"></div>

    <div class="qna-list-search">
      <select id="searchType" class="qna-list-search-sel">
        <option value="title">제목</option>
        <option value="writer">작성자</option>
        <option value="content">내용</option>
      </select>

      <input
        type="text"
        id="searchInput"
        class="qna-list-search-inp"
        placeholder="검색할 내용을 입력하세요"
      >

      <button type="button" id="btnSearch" class="qna-list-search-btn">검색</button>
      <a href="add-post.html" class="qna-list-search-btn-write">글쓰기</a>
    </div>
  </main>

  <script src="../../../assets/js/main/community/post-list.js"></script>
</body>
</html>
