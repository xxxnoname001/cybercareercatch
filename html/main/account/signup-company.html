<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기업 회원가입</title>
  <link rel="stylesheet" href="../../../assets/css/main/account/signup-company.css" />
</head>
<body class="company-signup-body">
  <!-- 공통 header -->

  <main class="corp-join-page">
    <section class="corp-join-wrap" aria-labelledby="corpJoinTitle">
      <h1 id="corpJoinTitle" class="corp-join-title">기업 회원가입</h1>

      <form class="corp-join-form" action="#" method="post" novalidate>
        <!-- 기업명 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="companyName">
              기업명<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox" id="companyNameBox">
              <input
                type="text"
                id="companyName"
                name="companyName"
                placeholder="ex) (주) 사이버커리어캐치"
                autocomplete="organization"
              />
            </div>
          </div>
        </div>

        <!-- 사업자등록번호 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="businessNumber">
              사업자등록번호<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox" id="businessNumberBox">
              <input
                type="text"
                id="businessNumber"
                name="businessNumber"
                placeholder="ex) 123-45-67890"
                inputmode="numeric"
                maxlength="12"
              />
            </div>
          </div>
        </div>

        <!-- 기업 주소 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="companyAddress">
              기업 주소<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox" id="companyAddressBox">
              <input
                type="text"
                id="companyAddress"
                name="companyAddress"
                placeholder="ex) 서울시 강남구 테헤란로 123"
                autocomplete="street-address"
              />
            </div>
          </div>
        </div>

        <!-- 담당자 이름 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="managerName">
              담당자 이름<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox" id="managerNameBox">
              <input
                type="text"
                id="managerName"
                name="managerName"
                placeholder="ex) 홍길동"
                autocomplete="name"
              />
            </div>
          </div>
        </div>

        <!-- 담당자 전화번호 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="managerPhone">
              담당자 전화번호<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control corp-control--with-btn">
            <div class="corp-inputbox" id="managerPhoneBox">
              <input
                type="tel"
                id="managerPhone"
                name="managerPhone"
                placeholder="ex) 01012345678"
                inputmode="numeric"
                maxlength="11"
                autocomplete="tel"
              />
            </div>
            <button type="button" class="corp-action-btn" id="requestSmsBtn">
              인증요청
            </button>
          </div>
        </div>

        <!-- 인증번호 입력 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="authCode">
              인증번호 입력<span class="required">*</span>
            </label>

            <!-- JS 연결 시 is-show 추가 -->
            <span class="corp-feedback corp-feedback--error" id="authCodeErrorMsg">
              잘못된 인증번호입니다
            </span>
            <span class="corp-feedback corp-feedback--success" id="authCodeSuccessMsg">
              인증이 완료되었습니다
            </span>
          </div>

          <div class="corp-control corp-control--with-btn">
            <div class="corp-inputbox" id="authCodeBox">
              <input
                type="text"
                id="authCode"
                name="authCode"
                placeholder="ex) 123456"
                inputmode="numeric"
                maxlength="6"
                autocomplete="one-time-code"
              />
            </div>
            <button type="button" class="corp-action-btn" id="verifyAuthCodeBtn">
              확인
            </button>
          </div>
        </div>

        <!-- 아이디 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="userId">
              아이디<span class="required">*</span>
            </label>

            <!-- JS 연결 시 둘 중 하나만 is-show -->
            <span class="corp-feedback corp-feedback--error" id="userIdErrorMsg">
              중복된 아이디입니다
            </span>
            <span class="corp-feedback corp-feedback--success" id="userIdSuccessMsg">
              사용 가능한 아이디입니다
            </span>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox corp-inputbox--icon" id="userIdBox">
              <span class="corp-inputbox__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="8" r="4"></circle>
                  <path d="M4 20a8 8 0 0 1 16 0"></path>
                </svg>
              </span>
              <input
                type="text"
                id="userId"
                name="userId"
                placeholder="ex) hong1234"
                maxlength="20"
                autocomplete="username"
              />
            </div>
          </div>
        </div>

        <!-- 비밀번호 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="password">
              비밀번호<span class="required">*</span>
            </label>
          </div>

          <div class="corp-control">
            <div class="corp-inputbox corp-inputbox--icon" id="passwordBox">
              <span class="corp-inputbox__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                  <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="영문, 숫자, 특수문자 포함 8자 이상"
                autocomplete="new-password"
              />
            </div>
          </div>

          <p class="corp-help">영문, 숫자, 특수문자를 포함해 8자 이상 입력해주세요.</p>
        </div>

        <!-- 비밀번호 재확인 -->
        <div class="corp-field">
          <div class="corp-field__head">
            <label class="corp-field__label" for="passwordConfirm">
              비밀번호 재확인<span class="required">*</span>
            </label>

            <!-- JS 연결 시 is-show 추가 -->
            <span class="corp-feedback corp-feedback--error" id="passwordConfirmErrorMsg">
              비밀번호가 일치하지 않습니다
            </span>
            <span class="corp-feedback corp-feedback--success" id="passwordConfirmSuccessMsg">
              비밀번호가 일치합니다
            </span>
          </div>

          <div class="corp-control corp-control--with-btn">
            <div class="corp-inputbox corp-inputbox--icon" id="passwordConfirmBox">
              <span class="corp-inputbox__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                  <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                </svg>
              </span>
              <input
                type="password"
                id="passwordConfirm"
                name="passwordConfirm"
                placeholder="비밀번호를 한 번 더 입력하세요"
                autocomplete="new-password"
              />
            </div>
            <button type="button" class="corp-action-btn" id="checkPasswordBtn">
              확인
            </button>
          </div>
        </div>

        <button type="submit" class="corp-join-submit">회원가입</button>
      </form>
    </section>
  </main>

  <!-- 공통 footer -->
</body>
</html>
