<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>
<link rel="stylesheet" href="/assets/css/admin/community-management/qna-management.css">
</head>

<body class="qnaManagement-body">

<div class="qnaManagement-container">

    <!-- 상단 헤더 -->
    <header class="qnaManagement-top">
        
        <div class="qnaManagement-title">관리자 페이지</div>

        <nav class="qnaManagement-menu1">
            <a href="#">회원 관리</a>
            <a href="#">메인 관리</a>
            <a href="#">커뮤니티 관리</a>
        </nav>
        
        <button class="qnaManagement-logout">로그아웃</button>

    </header>


    <!-- 메인 영역 -->
    <main class="qnaManagement-main">

        <!-- 왼쪽 사이드 메뉴 -->
        <aside class="qnaManagement-leftbar">

            <div class="qnaManagement-left-item qnaManagement-real">
                질의문 관리
            </div>

            <div class="qnaManagement-left-item">
                기업 정보페이지
            </div>

            <div class="qnaManagement-left-item">
                로드맵 관리
            </div>

        </aside>

        <section class="qnaManagement-content">

            <!-- 질문1 -->
            <div class="qnaManagement-question">

                <h3>질문 1</h3>

                <input type="text">

                <div class="qnaManagement-btn-group">
                    <button type="button" class="qnaManagement-check">확인</button>
                    <button type="button" class="qnaManagement-revise">수정</button>
                    <button type="button" class="qnaManagement-cancel">취소</button>
                </div>

            </div>

            <!-- 질문2 -->
            <div class="qnaManagement-question">

                <h3>질문 2</h3>

                <input type="text">

                <div class="qnaManagement-btn-group">
                    <button type="button" class="qnaManagement-check">확인</button>
                    <button type="button" class="qnaManagement-revise">수정</button>
                    <button type="button" class="qnaManagement-cancel">취소</button>
                </div>

            </div>

            <!-- 질문3 -->
            <div class="qnaManagement-question">

                <h3>질문 3</h3>

                <input type="text">

                <div class="qnaManagement-btn-group">
                    <button type="button" class="qnaManagement-check">확인</button>
                    <button type="button" class="qnaManagement-revise">수정</button>
                    <button type="button" class="qnaManagement-cancel">취소</button>
                </div>

            </div>

        </section>

    </main>

</div>

<!-- JS는 body 맨 아래 -->
<script src="/assets/js/admin/qna-management.js"></script>

</body>
</html>
